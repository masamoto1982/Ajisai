<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ajisai - A stack-based programming language inspired by FORTH">
    <meta name="theme-color" content="#007bff">
    
    <!-- PWA Support -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./images/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Ajisai">
    
    <title>Ajisai</title>

    <!-- 共通設定・テーマ（CSSより先に読み込み） -->
    <script src="/ajisai-config.js?v=20251230"></script>
    <script src="/ajisai-theme.js?v=20251230"></script>
    <style id="theme-vars"></style>
    <script>
        // テーマをスタイルタグとして注入
        if (typeof AjisaiTheme !== 'undefined') {
            const vars = AjisaiTheme.getAll();
            let css = ':root {';
            for (const [key, value] of Object.entries(vars)) {
                css += `${key}: ${value};`;
            }
            css += '}';
            document.getElementById('theme-vars').textContent = css;
        }
    </script>

    <link rel="stylesheet" href="public/ajisai-base.css?v=20251230">
    <link rel="stylesheet" href="app-interface.css?v=20251230">
</head>
<body>
    <a href="#code-input" class="skip-link">Skip to main content</a>
    <div class="container">
        <header role="banner">
            <div class="app-header-top">
                <div class="app-brand-block">
                    <img src="public/images/ajisai-logo-thumbnail-w40.jpg" alt="Ajisai Logo" class="logo">
                    <div class="app-brand-meta">
                        <h1>Ajisai</h1>
                        <span class="version">ver.202603211236</span>
                    </div>
                </div>
                <span id="offline-indicator" class="offline-indicator" style="display: none;">Offline</span>
            </div>
            <div class="header-actions">
                <a href="docs/index.html" class="reference-btn" target="_blank">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M9 9h6v6M15 9l-6 6M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>
                    </svg>
                    Reference
                </a>
                <button id="test-btn" class="test-btn" type="button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Test
                </button>
            </div>
        </header>

        <nav class="area-tabs" aria-label="Area switches">
            <div class="tab-group" role="group" aria-label="Left pane switch">
                <button id="panel-switch-input" class="area-tab active" type="button" data-pane="input" aria-controls="input-panel" aria-pressed="true">Input</button>
                <button id="panel-switch-output" class="area-tab" type="button" data-pane="output" aria-controls="output-panel" aria-pressed="false">Output</button>
            </div>
            <div class="tab-group" role="group" aria-label="Right pane switch">
                <button id="panel-switch-stack" class="area-tab active" type="button" data-pane="stack" aria-controls="stack-panel" aria-pressed="true">Stack</button>
                <button id="panel-switch-dictionary" class="area-tab" type="button" data-pane="dictionary" aria-controls="dictionary-panel" aria-pressed="false">Dictionary</button>
            </div>
        </nav>

        <main class="main-layout">
            <div id="editor-panel" class="panel">
                <section id="output-panel" class="output-area" aria-labelledby="panel-switch-output" tabindex="0" hidden>
                    <h2 class="visually-hidden">Output</h2>
                    <div id="output-display" class="display-area" aria-live="polite" aria-atomic="false"></div>
                </section>
                <section id="input-panel" class="input-area" aria-labelledby="panel-switch-input" tabindex="0">
                    <h2 class="visually-hidden">Input</h2>
                    <div class="textarea-wrapper">
                        <textarea id="code-input" aria-label="Ajisai code input" placeholder="Enter code here"></textarea>
                        <button id="clear-btn" type="button" class="inline-clear-btn" aria-label="Clear input">&times;</button>
                    </div>
                    <div class="controls">
                        <button id="run-btn" type="button">Run</button>
                        <button id="json-import-btn" type="button" class="json-import-btn" aria-label="Import JSON as vector">JSON</button>
                    </div>
                </section>
            </div>
            
            <div id="state-panel" class="panel">
                <section id="stack-panel" class="stack-area" aria-labelledby="panel-switch-stack" tabindex="0">
                    <h2 class="visually-hidden">Stack</h2>
                    <div id="stack-display" class="state-display" aria-live="polite" aria-atomic="false"></div>
                </section>
                
                <section id="dictionary-panel" class="dictionary-area" aria-labelledby="panel-switch-dictionary" tabindex="0" hidden>
                    <div class="dictionary-toolbar">
                        <div class="dictionary-sheet-switcher" role="radiogroup" aria-label="Dictionary category">
                            <button id="dictionary-sheet-core-button" class="dictionary-sheet-button active" type="button" data-sheet="core" aria-controls="dictionary-sheet-core" aria-pressed="true">Built-in word</button>
                            <button id="dictionary-sheet-custom-button" class="dictionary-sheet-button" type="button" data-sheet="custom" aria-controls="dictionary-sheet-custom" aria-pressed="false">Custom word</button>
                        </div>
                        <div class="search-wrapper">
                            <input type="text" id="dictionary-search" class="vocabulary-search-input" placeholder="Search word" aria-label="Search word">
                            <button id="dictionary-search-clear-btn" type="button" class="inline-clear-btn vocabulary-search-clear-btn" aria-label="Clear search">&times;</button>
                        </div>
                    </div>
                    <div id="dictionary-sheet-core" class="dictionary-sheet active">
                        <div class="vocabulary-container">
                            <div class="words-area">
                                <span id="core-word-info" class="word-info-display"></span>
                                <div id="core-words-display" class="words-display"></div>
                            </div>
                        </div>
                    </div>
                    <div id="dictionary-sheet-custom" class="dictionary-sheet" hidden>
                        <div class="vocabulary-container">
                            <div class="words-area">
                                <span id="custom-word-info" class="word-info-display"></span>
                                <div id="custom-words-display" class="words-display"></div>
                            </div>
                        </div>
                        <div class="vocabulary-actions">
                            <button id="export-btn" class="header-btn" type="button">Export</button>
                            <button id="import-btn" class="header-btn" type="button">Import</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
        <footer>
            <span>&copy; <span id="footer-year"></span> masamoto yamashiro</span>
            <a href="https://github.com/masamoto1982/Ajisai" target="_blank" rel="noopener noreferrer">GitHub</a>
        </footer>
        <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
    </div>

    <script type="module" src="js/web-app-entrypoint.ts"></script>
</body>
</html>
