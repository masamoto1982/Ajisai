[package]
name = "ajisai-core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1.7"
# Add the 'rug' crate for arbitrary-precision rational numbers
rug = { version = "1.12", features = ["serde"] }

[dev-dependencies]
wasm-bindgen-test = "0.3.34"

[profile.release]
lto = true
