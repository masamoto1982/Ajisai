[package]
name = "ajisai-core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1.7"
rug = { version = "1.12", features = ["serde"] }

# `rug`が依存するgmp-mpfr-sysを直接追加し、
# WebAssemblyへのクロスコンパイルを強制する機能を有効にする
gmp-mpfr-sys = { version = "1.6.5", features = ["force-cross"] }


[dev-dependencies]
wasm-bindgen-test = "0.3.34"

[profile.release]
lto = true
