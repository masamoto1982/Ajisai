name: Quality issue
about: Track verification gaps, process deviations, or quality defects.
title: "[QUALITY] "
labels: [quality]
body:
  - type: input
    id: area
    attributes:
      label: Impacted area
      placeholder: rust/interpreter, tokenizer, wasm boundary, docs, CI...
    validations:
      required: true

  - type: dropdown
    id: level
    attributes:
      label: Internal level
      options:
        - QL-A
        - QL-B
        - QL-C
        - QL-D
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Describe observed behavior or quality process gap.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected quality state
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Verification evidence
      description: Logs, test output, CI URLs, screenshots, repro commands.

  - type: textarea
    id: traceability
    attributes:
      label: Traceability impact
      description: Which AQ-REQ/AQ-VER links are impacted or missing?
