name: Test Ajisai

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      # Staged rollout:
      # set repository variable AJISAI_STRICT_QUALITY=true to make advisory checks blocking.
      AJISAI_STRICT_QUALITY: ${{ vars.AJISAI_STRICT_QUALITY || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        continue-on-error: ${{ env.AJISAI_STRICT_QUALITY != 'true' }}
        run: cargo install cargo-llvm-cov --locked

      - name: Rust format check (staged)
        continue-on-error: ${{ env.AJISAI_STRICT_QUALITY != 'true' }}
        working-directory: rust
        run: cargo fmt --check

      - name: Rust clippy (deny warnings, staged)
        continue-on-error: ${{ env.AJISAI_STRICT_QUALITY != 'true' }}
        working-directory: rust
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust all-target tests
        working-directory: rust
        run: cargo test --all-targets --verbose

      - name: Rust branch coverage (staged)
        continue-on-error: ${{ env.AJISAI_STRICT_QUALITY != 'true' }}
        working-directory: rust
        run: cargo llvm-cov --branch --workspace --no-report

      - name: Generate perf regression JSONL
        working-directory: rust
        run: cargo test perf_regression -- --nocapture

      - name: Compare perf report against baseline
        run: scripts/compare-perf.sh bench-baselines/main.jsonl rust/target/perf-report.jsonl ${{ env.AJISAI_STRICT_QUALITY == 'true' && 'strict' || 'advisory' }}

      - name: Upload perf regression report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-jsonl
          path: rust/target/perf-report.jsonl
          retention-days: 90

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Semantic firewall
        run: npm run check:semantic-firewall

      - name: Rust file-size budget (§14.1)
        # Enforces the SPECIFICATION §14.1 500-line budget mechanically: new or
        # substantially-rewritten Rust files must stay at or under 500 lines, and
        # the recorded over-budget baseline (docs/quality/file-size-baseline.json)
        # may not grow by >=10%. See scripts/check-file-size-budget.mjs.
        run: npm run check:file-size

      - name: Verify source provenance attestation
        # Injection tripwire: the committed content-addressed attestation over the
        # trust-critical source surface must match the working tree, and the root
        # pin must agree. A backdoor that changes any tracked source without a
        # regenerated, reviewed attestation fails here.
        # See docs/dev/source-provenance-attestation-design.md.
        run: npm run provenance:check

      - name: Generate conformance manifest
        run: npm run conformance:manifest

      - name: Verify committed word manifest is in sync
        # Drift guard: the committed docs/word-manifest.json must match what the
        # generator produces from the Rust sources. Checking (instead of silently
        # regenerating) is what catches a missing word like SUPERVISE.
        run: npm run word:manifest:check

      - name: Verify committed SKILL.md is in sync
        # SKILL.md is generated (never hand-written): the generator executes
        # every embedded snippet through the ajisai CLI, so this step both
        # catches a stale committed copy and proves the guide still matches
        # the implementation. The cargo target dir is already warm from the
        # test steps above, so the CLI build is incremental.
        run: |
          cargo build --bin ajisai --manifest-path rust/Cargo.toml
          npm run check:skill

      - name: Generate primitive test map
        run: npm run primitive:test-map

      - name: Check formalization coverage
        run: npm run check:formalization-coverage

      - name: TypeScript check
        run: npm run check

      - name: ESLint
        run: npm run lint

      - name: TypeScript MC/DC tests (Vitest)
        run: npm test

      - name: Quality gate mode summary
        run: |
          if [ "${AJISAI_STRICT_QUALITY}" = "true" ]; then
            echo "Quality gate mode: STRICT (blocking)."
          else
            echo "Quality gate mode: STAGED (advisory for fmt/clippy/coverage/install)."
            echo "Set repo variable AJISAI_STRICT_QUALITY=true to enforce strict blocking mode."
          fi

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Rust native check (Core build, no wasm deps)
        working-directory: rust
        run: cargo check

      - name: Run all Rust tests
        working-directory: rust
        run: cargo test --verbose

      - name: Verify WASM build
        working-directory: rust
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check --features wasm --target wasm32-unknown-unknown

      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.13.1

      - name: Detect stale committed wasm bundle (advisory)
        # Build the wasm bundle the same way the deploy workflow does and
        # compare against the committed copy. This is advisory only: even
        # if the committed bundle is stale, the deploy workflow rebuilds
        # before publishing, so production stays fresh. The warning exists
        # so reviewers know `npm run build:wasm` is needed for local dev to
        # match production.
        continue-on-error: true
        run: |
          set -e
          if ! command -v wasm-pack >/dev/null 2>&1; then
            bash ./scripts/install-wasm-pack.sh || {
              echo "::warning::wasm-pack install failed during stale-bundle check; skipping diff."
              exit 0
            }
          fi
          bash ./scripts/rebuild-wasm.sh > /tmp/rebuild-wasm.log 2>&1 || {
            cat /tmp/rebuild-wasm.log
            echo "::warning::wasm rebuild failed during stale-bundle check; skipping diff."
            exit 0
          }
          if ! git diff --quiet -- src/wasm/generated/; then
            echo "::warning::Committed src/wasm/generated/ bundle is stale relative to the Rust source."
            echo "::warning::Run \`npm run build:wasm\` and commit the result so local dev matches production."
            git --no-pager diff --stat -- src/wasm/generated/
          else
            echo "Committed wasm bundle matches a fresh build."
          fi

  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript type check
        run: npm run check

      - name: Run Vitest MC/DC tests
        run: npm test

  reference-differential:
    name: Reference Interpreter Differential
    runs-on: ubuntu-latest
    env:
      # Staged rollout (same convention as Quality Gate):
      # the production CLI is diffed against the Python Core reference
      # interpreter (tools/ajisai-repro). Divergences are surfaced as candidate
      # class-A spec holes / class-B bugs; they are recorded, not auto-fixed.
      # Advisory by default; set repository variable AJISAI_STRICT_QUALITY=true
      # to make a divergence block.
      AJISAI_STRICT_QUALITY: ${{ vars.AJISAI_STRICT_QUALITY || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build production CLI
        working-directory: rust
        run: cargo build --bin ajisai --release

      - name: Differential test (production CLI vs Core reference interpreter)
        # Python standard library only; no extra dependencies are installed.
        # compare.py resolves the CLI via AJISAI_BIN, defaulting to the
        # repo-relative rust/target/release/ajisai, and exits non-zero on any
        # divergence.
        continue-on-error: ${{ env.AJISAI_STRICT_QUALITY != 'true' }}
        run: python3 tools/ajisai-repro/compare.py

      - name: Differential mode summary
        run: |
          if [ "${AJISAI_STRICT_QUALITY}" = "true" ]; then
            echo "Differential mode: STRICT (a divergence blocks)."
          else
            echo "Differential mode: ADVISORY (divergences are reported, not blocking)."
            echo "Set repo variable AJISAI_STRICT_QUALITY=true to enforce strict blocking mode."
          fi

  wasm-boundary-tests:
    name: WASM Boundary Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust (with wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.13.1

      - name: Install wasm-pack
        run: bash ./scripts/install-wasm-pack.sh

      # Drives the real wasm-bindgen boundary (AjisaiInterpreter -> collect_stack)
      # in Node. Lives in a standalone crate so the main package's proptest
      # dev-dep (which does not build for wasm32) never enters the graph.
      - name: Run WASM boundary tests
        working-directory: rust/wasm-tests
        run: wasm-pack test --node
