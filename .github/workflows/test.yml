name: Test Ajisai

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      # Staged rollout:
      # set repository variable AJISAI_STRICT_QUALITY=true to make advisory checks blocking.
      AJISAI_STRICT_QUALITY: ${{ vars.AJISAI_STRICT_QUALITY || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        continue-on-error: ${{ env.AJISAI_STRICT_QUALITY != 'true' }}
        run: cargo install cargo-llvm-cov --locked

      - name: Rust format check (staged)
        continue-on-error: ${{ env.AJISAI_STRICT_QUALITY != 'true' }}
        working-directory: rust
        run: cargo fmt --check

      - name: Rust clippy (deny warnings, staged)
        continue-on-error: ${{ env.AJISAI_STRICT_QUALITY != 'true' }}
        working-directory: rust
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust all-target tests
        working-directory: rust
        run: cargo test --all-targets --verbose

      - name: Rust branch coverage (staged)
        continue-on-error: ${{ env.AJISAI_STRICT_QUALITY != 'true' }}
        working-directory: rust
        run: cargo llvm-cov --branch --workspace --no-report

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run check

      - name: Quality gate mode summary
        run: |
          if [ "${AJISAI_STRICT_QUALITY}" = "true" ]; then
            echo "Quality gate mode: STRICT (blocking)."
          else
            echo "Quality gate mode: STAGED (advisory for fmt/clippy/coverage/install)."
            echo "Set repo variable AJISAI_STRICT_QUALITY=true to enforce strict blocking mode."
          fi

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run all Rust tests
        working-directory: rust
        run: cargo test --verbose

      - name: Verify WASM build
        working-directory: rust
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check --target wasm32-unknown-unknown

  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript type check
        run: npm run check
