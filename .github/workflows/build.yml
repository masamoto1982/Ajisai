name: Build and Deploy Ajisai

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache wasm-pack
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.13.1

      - name: Install wasm-pack
        run: bash ./scripts/install-wasm-pack.sh

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Verify bench compilation
        run: cd rust && cargo bench --no-run

      - name: Build WASM artifacts
        # Write straight into src/wasm/generated/ so the Vite build below
        # always picks up the freshest bundle, regardless of whether the
        # committed copy on main was rebuilt. See scripts/rebuild-wasm.sh
        # for the same logic for local rebuilds.
        run: bash ./scripts/rebuild-wasm.sh

      - name: Update asset version stamps
        run: |
          VERSION=$(date -u +%Y%m%d%H%M)
          sed -i "s/?v=[0-9]*/?v=${VERSION}/g" index.html

      - name: Build TypeScript
        run: npm run build

      - name: Build with Vite
        run: npx vite build

      - name: Copy the specification into the site
        # SPECIFICATION.html is an authored HTML document
        # (docs/dev/ajisai-authoring-style.md). GitHub's repository view shows
        # HTML as source, so the rendered surface is the Pages site:
        # /SPECIFICATION.html next to the Playground.
        run: cp SPECIFICATION.html dist/

      - name: Create .nojekyll file
        run: touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
