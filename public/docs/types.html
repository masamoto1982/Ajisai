<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajisai | Types</title>
  <script src="../ajisai-config.js?v=20260410"></script>
  <script src="../ajisai-theme.js?v=20260410"></script>
  <script src="../shared/ajisai-shared-ui.js?v=20260411"></script>
  <style id="theme-vars"></style>
  <script>
    if (typeof AjisaiTheme !== 'undefined') {
      const vars = AjisaiTheme.getAll();
      let css = ':root {';
      for (const [key, value] of Object.entries(vars)) {
        css += `${key}: ${value};`;
      }
      css += '}';
      document.getElementById('theme-vars').textContent = css;
    }
  </script>
  <link href="../ajisai-base.css?v=20260408" media="screen" rel="stylesheet" />
  <link href="css/docs-reference-styles.css?v=20260408" media="screen" rel="stylesheet" />
</head>

    <main class="content-wrapper" role="main">
      <nav id="js-side-nav" class="side-nav"></nav>

      <article id="main-content" class="main-content">
        <section>
          <h2>Types</h2>
          <p>Ajisai is currently under active development. Documentation is not yet publicly available.</p>
        </section>
      </article>
    </main>

    <footer id="js-footer"></footer>
  </div>

</body>
</html>
